# /etc/nginx/sites-available/shasansetu-api
#
# Nginx reverse proxy for ShasanSeva API
# Includes: bot blocking, rate limiting, proxy to Docker container
#
# APPLY THIS ON EC2:
#   sudo cp nginx-shasansetu-api.conf /etc/nginx/sites-available/shasansetu-api
#   sudo nginx -t && sudo systemctl reload nginx

# --- Rate limiting zones (defined outside server block) ---
# Limit general API requests: 10 requests/sec per IP, burst up to 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Stricter limit for auth endpoints: 5 requests/sec per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# --- Bot/scanner user-agent blocking map ---
map $http_user_agent $is_bot {
    default 0;
    ~*zgrab                     1;
    ~*censys                    1;
    ~*cyberok                   1;
    ~*visionheight              1;
    ~*endpoint-checker          1;
    ~*HeapdumpScanner           1;
    ~*python-requests           1;
    ~*axios/1\.13               1;  # The IAMS bot uses this
    ~*Go-http-client            1;
    ~*Fennec                    1;
    ~*HTTP.Banner.Detection     1;
}

server {
    listen 80;
    server_name api.shasanseva.in;

    # Maximum upload size
    client_max_body_size 10M;

    # --- Block bots/scanners immediately ---
    # Returns 444 (nginx drops connection silently - no response body, saves bandwidth)
    if ($is_bot) {
        return 444;
    }

    # --- Block known junk paths that are NOT your API ---
    # These are vulnerability probes — reject them before they reach Node.js
    location ~ ^/(\.env|\.git|\.htaccess|wp-admin|wp-login|phpmyadmin|admin\.php) {
        return 444;
    }
    location ~ ^/(owa|solr|webui|geoserver|login\.do|actuator|iams|dns-query) {
        return 444;
    }
    location ~ ^/(containers|ReportServer|developmentserver|ecp|aspera|sitecore) {
        return 444;
    }
    location ~ \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    # --- API proxy ---
    location / {
        # Apply rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3001;

        # Pass real client info to Express
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — increased to 90s to handle slow DB queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # --- Stricter rate limiting for auth endpoints ---
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}
